schema_version: 1
project: CastorTS
references:
  castorts_main_pdf: C:/Users/86131/Downloads/main.pdf
  rose_arxiv: https://arxiv.org/pdf/2405.17478
  sempo_arxiv: https://arxiv.org/pdf/2510.19710
  ttm_arxiv: https://arxiv.org/pdf/2401.03955v8
  monash_forecasting_repository: https://forecastingdata.org/
  tslib_huggingface: https://huggingface.co/datasets/thuml/Time-Series-Library
  utsd_huggingface: https://huggingface.co/datasets/thuml/UTSD
  uci_prsa: https://archive.ics.uci.edu/dataset/501/beijing+multi+site+air+quality+data
  time_series_classification_archive: https://www.timeseriesclassification.com/
  std_mae_pems: https://github.com/Jimmy-7664/STD-MAE
notes:
  - Pretraining and evaluation datasets must be non-overlapping.
  - Pretraining entries follow the open-domain datasets reported by the CastorTS paper.
  - Evaluation entries follow the seven TSLib downstream datasets used for zero-shot and few-shot forecasting.
  - The loader supports local npy, npz, csv, txt, parquet, arrow, and tsf files, but it does not download large datasets automatically.

